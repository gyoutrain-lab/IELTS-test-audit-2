<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master Competency Audit System</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 30px; }
        .platform-container { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .action-btn { width: 100%; padding: 18px; background: #2c3e50; color: white; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; }
        
        /* Certificate View */
        #certArea { display: none; margin-top: 50px; border: 8px double #2c3e50; padding: 50px; background: white; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="platform-container">
    <div class="no-print">
        <h1>Master Competency Audit & Certification</h1>
        <div class="input-group">
            <input type="text" id="cName" placeholder="Candidate Full Name">
        </div>
        <div class="input-group">
            <input type="text" id="cID" placeholder="Candidate ID Number">
        </div>
        <div class="input-group">
            <input type="text" id="cComp" placeholder="Competency Title (e.g., Clinical Nursing Reporting)">
        </div>
        <div class="input-group">
            <textarea id="cInput" rows="10" placeholder="Paste response for audit..."></textarea>
        </div>
        <button class="action-btn" onclick="generateFinalReport()">Execute Audit & Generate Certificate</button>
    </div>

    <!-- Official Certificate Output -->
    <div id="certArea">
        <h1 style="text-align:center;">CERTIFICATE OF COMPETENCY</h1>
        <hr>
        <p><strong>Name:</strong> <span id="vName"></span></p>
        <p><strong>ID:</strong> <span id="vID"></span></p>
        <p><strong>Area:</strong> <span id="vComp"></span></p>
        
        <table style="width:100%; border:1px solid #ddd; border-collapse:collapse; margin: 30px 0;">
            <tr style="background:#f8f9fa;">
                <th style="padding:15px; border:1px solid #ddd;">Indicator</th>
                <th style="padding:15px; border:1px solid #ddd;">Band Score</th>
            </tr>
            <tr><td style="padding:10px;">Lexical Resource (Domain Terms)</td><td id="vS1" style="text-align:center;"></td></tr>
            <tr><td style="padding:10px;">Grammatical Range (Structure)</td><td id="vS2" style="text-align:center;"></td></tr>
            <tr><td style="padding:10px;">Coherence (Logical Flow)</td><td id="vS3" style="text-align:center;"></td></tr>
            <tr><td style="padding:10px; color:red;">Professional Penalty</td><td id="vS4" style="text-align:center;"></td></tr>
            <tr style="font-size:1.2em; font-weight:bold;">
                <td style="padding:15px;">TOTAL BAND SCORE</td>
                <td id="vBand" style="text-align:center;"></td>
            </tr>
        </table>
        
        <div id="vStatus" style="text-align:center; font-size:1.5em; font-weight:bold; margin-top:20px;"></div>
        
        <div style="display:flex; justify-content:space-between; margin-top:100px;">
            <div>Assessor Signature:<br>____________________</div>
            <div>Date: <span id="vDate"></span></div>
        </div>
        
        <button class="no-print action-btn" style="margin-top:40px; background:#27ae60;" onclick="window.print()">Print Official Certificate</button>
    </div>
</div>

<script>
function generateFinalReport() {
    const text = document.getElementById('cInput').value;
    const count = (reg) => (text.match(reg) || []).length;

    // Audit Logic (Weighted)
    const s1 = Math.min(9, 4 + (count(/\b(exhibit|escalate|monitor|hemodynamic|pharmacological|intervention|stabilize|manifest|acute|assess|reassess|systematic|compliance)\b/gi) * 0.5)).toFixed(1);
    const s2 = Math.min(9, 4 + (count(/\b(was|were|has been|had been)\s\w+ed\b/gi) * 0.4) + (count(/\b(although|whereas|notwithstanding|consequently|provided that)\b/gi) * 0.5)).toFixed(1);
    const s3 = Math.min(9, 4 + (count(/\b(furthermore|however|subsequently|concurrently|nevertheless|in addition)\b/gi) * 0.6)).toFixed(1);
    const s4 = Math.min(9, (count(/\b(BP|check on|good|bad|get|fix|later|hard|fast|stuff|really)\b/gi) * 1.2)).toFixed(1);
    
    const band = Math.max(1, ((parseFloat(s1) + parseFloat(s2) + parseFloat(s3)) / 3 - (s4 / 4))).toFixed(1);

    // Populate Data
    document.getElementById('vName').innerText = document.getElementById('cName').value;
    document.getElementById('vID').innerText = document.getElementById('cID').value;
    document.getElementById('vComp').innerText = document.getElementById('cComp').value;
    document.getElementById('vS1').innerText = s1;
    document.getElementById('vS2').innerText = s2;
    document.getElementById('vS3').innerText = s3;
    document.getElementById('vS4').innerText = s4;
    document.getElementById('vBand').innerText = band;
    document.getElementById('vStatus').innerText = band >= 7 ? "MASTERY LEVEL ACHIEVED" : "DEVELOPMENTAL LEVEL";
    document.getElementById('vDate').innerText = new Date().toLocaleDateString();

    document.getElementById('certArea').style.display = 'block';
}
</script>
</body>
</html>
